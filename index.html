<style>

<body>
<div id="title-screen" style="position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#b3ecff,#ffd9f0 45%,#fff4c2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:20px;">

    <div style="font-size:34px;font-weight:900;color:#ff3f97;text-shadow:2px 2px 0 #fff,0 0 12px rgba(255,255,255,0.6);letter-spacing:2px;margin-top:8px">フルーツドロップ</div>

<div id="game-container" style="display:none;">
  <div id="ui-bar">

<script>
// ===================== FRUIT DATA =====================
const FRUITS = [
  { name: 'さくらんぼ', emoji: '🍒', radius: 14, score: 1,  color: '#e83c3c', next: 1 },
  { name: 'いちご',     emoji: '🍓', radius: 20, score: 3,  color: '#e8557a', next: 2 },
  { name: 'ぶどう',     emoji: '🍇', radius: 27, score: 6,  color: '#9b59b6', next: 3 },
  { name: 'みかん',     emoji: '🍊', radius: 34, score: 10, color: '#e67e22', next: 4 },
  { name: 'レモン',     emoji: '🍋', radius: 40, score: 15, color: '#f4d03f', next: 5 },
  { name: 'りんご',     emoji: '🍎', radius: 48, score: 21, color: '#e74c3c', next: 6 },
  { name: 'なし',       emoji: '🍐', radius: 56, score: 28, color: '#a8c256', next: 7 },
  { name: 'もも',       emoji: '🍑', radius: 64, score: 36, color: '#f1948a', next: 8 },
  { name: 'パイン',     emoji: '🍍', radius: 72, score: 45, color: '#f7ca18', next: 9 },
  { name: 'メロン',     emoji: '🍈', radius: 82, score: 55, color: '#58d68d', next: 10 },
  { name: 'スイカ',     emoji: '🍉', radius: 96, score: 100, color: '#27ae60', next: 10 },
];

// ===================== BOMB DATA =====================
const BOMBS = [
  { name: "爆弾",   emoji: "💣", radius: 28, stage: 0, color: "#555555" },
  { name: "大爆弾", emoji: "💥", radius: 40, stage: 1, color: "#ff6600" },
  { name: "超爆弾", emoji: "🔥", radius: 54, stage: 2, color: "#ff0000" },
];
const BOMB_MARKER = "BOMB";

// ===================== AUDIO =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;
let bgmNodes = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playMergeSound(level) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    const freq = 300 + level * 80;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    osc.start(); osc.stop(ctx.currentTime + 0.25);
  } catch(e) {}
}

function playDropSound() {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(); osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

// ===================== BGM SYSTEM (royalty-free tracks) =====================
let bgmLevel = -1;
let bgmAudio = null;
const BGM_VOL = 0.5;
const bgmCache = {};

function getBgmAudio(level) {
  if (!bgmCache[level]) {
    const a = new Audio('bgm' + level + '.mp3');
    a.loop = true; a.preload = 'auto'; a.volume = BGM_VOL;
    bgmCache[level] = a;
  }
  return bgmCache[level];
}

function stopBGM() {
  if (bgmAudio) { try { bgmAudio.pause(); } catch (e) {} }
}

function startBGM(level = 0) {
  level = Math.max(0, Math.min(level, 4));
  bgmLevel = level;
  if (!soundEnabled) return;
  const a = getBgmAudio(level);
  if (bgmAudio && bgmAudio !== a) { try { bgmAudio.pause(); } catch (e) {} }
  bgmAudio = a;
  a.volume = BGM_VOL;
  const p = a.play();
  if (p && p.catch) p.catch(() => {});
}

// タップで再生がブロックされていたら復帰
document.addEventListener('pointerdown', () => {
  if (soundEnabled && bgmAudio && bgmAudio.paused) { bgmAudio.play().catch(() => {}); }
}, { passive: true });

// ===================== RANKING =====================
const MODE_LABEL = { normal:'通常', flip:'反転', time:'タイムアタック', mission:'ミッション', shape:'変形' };
function rankKey(mode) { return 'fruitdrop_rank_' + (mode || gameMode || 'normal'); }
function getRanking(mode) {
  try { return JSON.parse(localStorage.getItem(rankKey(mode)) || '[]'); } catch { return []; }
}
function saveRanking(score, mode) {
  const list = getRanking(mode);
  list.push({ score, date: new Date().toLocaleDateString('ja-JP') });
  list.sort((a, b) => b.score - a.score);
  localStorage.setItem(rankKey(mode), JSON.stringify(list.slice(0, 10)));
  return list[0].score === score && list.filter(r => r.score === score).length === 1;
}
function getBest(mode) {
  const r = getRanking(mode); return r.length ? r[0].score : 0;
}
// 旧スコアをリセット（全モード共通だった旧データを削除し、モード別に0から）
try { localStorage.removeItem('fruitdrop_ranking'); } catch (e) {}

// ===================== NEXT FRUIT QUEUE (先読み3つ) =====================
let bombEnabled = true;           // 爆弾あり/なし
let fruitQueue = [];              // 各要素 {idx, bomb}
function genFruit() {
  const bomb = bombEnabled && Math.random() < (1/30);
  return { bomb, idx: bomb ? 0 : Math.floor(Math.random() * 5) };
}
function ensureQueue() { while (fruitQueue.length < 4) fruitQueue.push(genFruit()); }
function resetQueue() { fruitQueue = []; ensureQueue(); }
function drawNextQueue() {
  for (let n = 1; n <= 3; n++) {
    const c = document.getElementById('next-canvas-' + n);
    if (!c) continue;
    const g = c.getContext('2d');
    g.clearRect(0, 0, c.width, c.height);
    const e = fruitQueue[n];
    if (!e) continue;
    const cx = c.width / 2, cy = c.height / 2, r = c.width / 2 - 2;
    g.fillStyle = (e.bomb ? '#555555' : FRUITS[e.idx].color) + '33';
    g.beginPath(); g.arc(cx, cy, r, 0, Math.PI * 2); g.fill();
    g.font = Math.floor(c.width * 0.62) + 'px serif';
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(e.bomb ? '💣' : FRUITS[e.idx].emoji, cx, cy + 1);
  }
}
resetQueue();

// ===================== PHASER GAME =====================
let gameScore = 0;
let quakeCharges = 0;
let gameOver = false;
let canDrop = true;
let dropCooldown = false;
let playerLife = 3;
let gameMode = 'normal'; // 'normal' or 'flip'

function updateLifeDisplay() {
  const hearts = ['', '🖤', '❤️❤️🖤', '❤️❤️❤️'];
  const display = ['💀', '❤️🖤🖤', '❤️❤️🖤', '❤️❤️❤️'];
  document.getElementById('life-display').textContent = display[Math.max(0, playerLife)];
}

const BASE_W = Math.min(400, window.innerWidth);
let GAME_W = BASE_W;
const GAME_H = Math.min(560, window.innerHeight - 120);
const WALL_T = 14;
const FLOOR_T = 14;

// ===================== BACKGROUNDS =====================
const BG_THEMES = [
  {
    name: '砂漠・夕焼け', threshold: 0,
    sky: ['#ff6b35','#f7931e','#ffcd3c','#ff4757'],
    particles: [{emoji:'🌵',count:4},{emoji:'🌅',count:2},{emoji:'⭐',count:6}],
    bgColor: 0x8B2500,
  },
  {
    name: '夜の街', threshold: 1000,
    sky: ['#0d0221','#1a0533','#2d1b69','#11998e'],
    particles: [{emoji:'🏙',count:3},{emoji:'✨',count:8},{emoji:'🌙',count:2}],
    bgColor: 0x0d0221,
  },
  {
    name: '森・自然', threshold: 2000,
    sky: ['#134e5e','#71b280','#2d5a27','#52c234'],
    particles: [{emoji:'🌿',count:5},{emoji:'🍃',count:6},{emoji:'🌸',count:3}],
    bgColor: 0x134e5e,
  },
  {
    name: '海の中', threshold: 3000,
    sky: ['#0052d4','#4364f7','#006fb9','#0099cc'],
    particles: [{emoji:'🐠',count:4},{emoji:'🫧',count:8},{emoji:'🐙',count:2}],
    bgColor: 0x0052d4,
  },
  {
    name: '宇宙・星空', threshold: 4000,
    sky: ['#000000','#0d0221','#1a0533','#16213e'],
    particles: [{emoji:'⭐',count:10},{emoji:'🌟',count:5},{emoji:'🚀',count:2}],
    bgColor: 0x000000,
  },
];

function getBgTheme(score) {
  let theme = BG_THEMES[0];
  for (const t of BG_THEMES) {
    if (score >= t.threshold) theme = t;
  }
  return theme;
}

document.getElementById('best-display').textContent = getBest();

class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  preload() {}

  create() {
    this.score = 0;
    this.fruits = [];
    this.merging = new Set();
    this.particles = [];
    gameOver = false;
    canDrop = true;
    dropCooldown = false;
    gameScore = 0;
    playerLife = 3;
    updateLifeDisplay();
    quakeCharges = 0;
    updateQuakeBtn();

    // Matter physics
    this.matter.world.setBounds(WALL_T, 0, GAME_W - WALL_T * 2, GAME_H - FLOOR_T, 64, true, true, true, true);
    this.matter.world.setGravity(0, 2);

    // 背景
    this.currentBgLevel = -1;
    this.bgGraphics = this.add.graphics().setDepth(-2);
    this.bgParticles = [];
    this.bgAnimItems = []; // 動的アニメ用
    this.loadBgPhotos();
    this.drawBackground(0);

    // Guide line (drop indicator)
    this.guideLine = this.add.graphics();

    // Walls visual
    const wallColor = 0xffffff;
    const wallAlpha = 0.22;
    this.add.rectangle(WALL_T / 2, GAME_H / 2, WALL_T, GAME_H, wallColor, wallAlpha);
    this.add.rectangle(GAME_W - WALL_T / 2, GAME_H / 2, WALL_T, GAME_H, wallColor, wallAlpha);
    this.add.rectangle(GAME_W / 2, GAME_H - FLOOR_T / 2, GAME_W, FLOOR_T, wallColor, wallAlpha);

    // Danger line (両側)
    this.dangerLine = this.add.graphics();
    this.dangerLine.lineStyle(1, 0xff4444, 0.4);
    this.dangerLine.lineBetween(WALL_T, 80, GAME_W - WALL_T, 80);
    this.dangerLine.lineBetween(WALL_T, GAME_H - 80, GAME_W - WALL_T, GAME_H - 80);

    // Current fruit indicator（キュー先頭）
    this.currentFruitIdx = fruitQueue[0].idx;
    this.currentIsBomb = fruitQueue[0].bomb;
    this.dropX = GAME_W / 2;
    const initPreviewY = 42;
    this.currentPreview = this.currentIsBomb
      ? this.createBombGraphic(this.dropX, initPreviewY, 0, true)
      : this.createFruitGraphic(this.dropX, initPreviewY, this.currentFruitIdx, true);
    drawNextQueue();

    // Input — 最初から自由に移動、指を離したら落下
    this.input.on('pointermove', (ptr) => {
      if (gameOver || dropCooldown) return;
      const f = FRUITS[this.currentFruitIdx];
      this.dropX = Phaser.Math.Clamp(ptr.x, WALL_T + f.radius + 2, GAME_W - WALL_T - f.radius - 2);
      this.updatePreview();
    });
    this.input.on('pointerup', (ptr) => {
      if (gameOver || dropCooldown) return;
      const f = FRUITS[this.currentFruitIdx];
      this.dropX = Phaser.Math.Clamp(ptr.x, WALL_T + f.radius + 2, GAME_W - WALL_T - f.radius - 2);
      this.dropFruit();
    });

    // Collision
    this.matter.world.on('collisionstart', (event) => {
      event.pairs.forEach(pair => this.handleCollision(pair.bodyA, pair.bodyB));
    });

    // 重力反転システム（反転モードのみ有効）
    this.gravityDir = 1;
    this.gravityTimer = 0;
    this.gravityInterval = [30000, 45000, 60000][Math.floor(Math.random() * 3)]; // 30/45/60秒ランダム
    this.warningActive = false;
    this.releasedDuringWarning = false;
    this.warningShown = false;
    this.lastCountNum = -1; // カウントダウン管理
    this.flipGracePeriod = 0;
    this.quakeGrace = 0;
    this.flipEnabled = (gameMode === 'flip');

    // ライフ表示
    document.getElementById('life-box').style.visibility = this.flipEnabled ? 'visible' : 'hidden';

    // ===== モード別セットアップ（time / mission） =====
    this.modeKind = gameMode; // 'normal' | 'flip' | 'time' | 'mission'
    this.timeLeft = 120000;
    this.missionIndex = 0;
    this.missions = [
      { type:'score',  val:100, label:'スコア100点' },
      { type:'create', idx:2,   label:'ぶどう🍇を作る' },
      { type:'score',  val:300, label:'スコア300点' },
      { type:'create', idx:5,   label:'りんご🍎を作る' },
      { type:'score',  val:800, label:'スコア800点' },
      { type:'create', idx:9,   label:'メロン🍈を作る' },
      { type:'create', idx:10,  label:'スイカ🍉を作る' },
    ];
    this.hud = this.add.text(GAME_W/2, 14, '', {
      fontSize:'15px', fontStyle:'bold', color:'#ffffff',
      stroke:'#000', strokeThickness:4, align:'center'
    }).setOrigin(0.5, 0).setDepth(12);
    this.updateHud();
    document.getElementById('best-display').textContent = getBest();
    if (this.modeKind === 'shape') this.buildShape();

    // 警告テキスト
    this.warningText = this.add.text(GAME_W / 2, GAME_H / 2, '', {
      fontSize: '32px', fontStyle: 'bold', color: '#FF4444',
      stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5).setAlpha(0).setDepth(10);

    // 重力インジケーター（矢印）
    this.gravityIndicator = this.add.text(GAME_W - 24, GAME_H / 2, '⬇', {
      fontSize: '20px'
    }).setOrigin(0.5).setDepth(10);

    // カウントダウンバー
    this.gravityBar = this.add.graphics().setDepth(9);

    startBGM(this.currentBgLevel >= 0 ? this.currentBgLevel : 0);
  }

  createFruitGraphic(x, y, fruitIdx, isPreview = false) {
    const f = FRUITS[fruitIdx];
    const g = this.add.graphics();
    const alpha = isPreview ? 0.55 : 1.0;

    // Glow
    if (!isPreview) {
      g.fillStyle(Phaser.Display.Color.HexStringToColor(f.color).color, 0.18);
      g.fillCircle(0, 0, f.radius + 6);
    }
    // Shadow
    g.fillStyle(0x000000, 0.2);
    g.fillCircle(3, 4, f.radius - 2);
    // Main circle
    const col = Phaser.Display.Color.HexStringToColor(f.color).color;
    g.fillStyle(col, alpha);
    g.fillCircle(0, 0, f.radius);
    // Highlight
    g.fillStyle(0xffffff, 0.25);
    g.fillCircle(-f.radius * 0.28, -f.radius * 0.28, f.radius * 0.32);
    // 白枠
    g.lineStyle(2, 0xffffff, isPreview ? 0.4 : 0.7);
    g.strokeCircle(0, 0, f.radius);
    g.x = x; g.y = y;

    // Emoji text
    const txt = this.add.text(x, y, f.emoji, {
      fontSize: Math.floor(f.radius * 1.7) + 'px',
      align: 'center'
    }).setOrigin(0.5, 0.52).setAlpha(alpha);

    return { g, txt, fruitIdx };
  }

  updatePreview() {
    if (!this.currentPreview) return;
    const previewY = this.gravityDir === 1 ? 42 : GAME_H - 42;
    this.currentPreview.g.x = this.dropX;
    this.currentPreview.g.y = previewY;
    this.currentPreview.txt.x = this.dropX;
    this.currentPreview.txt.y = previewY;
    this.drawGuideLine();
  }

  drawGuideLine() {
    this.guideLine.clear();
    this.guideLine.lineStyle(1, 0xffffff, 0.15);
    if (this.gravityDir === 1) {
      this.guideLine.lineBetween(this.dropX, 70, this.dropX, GAME_H - FLOOR_T);
    } else {
      this.guideLine.lineBetween(this.dropX, FLOOR_T, this.dropX, GAME_H - 70);
    }
  }

  dropFruit() {
    if (dropCooldown || gameOver) return;
    dropCooldown = true;
    canDrop = false;
    this.isHoldingFruit = false; // 落とした
    if (this.warningActive) this.releasedDuringWarning = true; // 警告中に離した→無傷
    playDropSound();

    const isBomb = this.currentIsBomb;
    const idx = this.currentFruitIdx;
    const x = this.dropX;
    const y = this.gravityDir === 1 ? 55 : GAME_H - 55;

    // Remove preview
    if (this.currentPreview) {
      this.currentPreview.g.destroy();
      this.currentPreview.txt.destroy();
      this.currentPreview = null;
    }
    this.guideLine.clear();

    // 落下エフェクト（軌跡の光）
    const trailColor = this.currentIsBomb ? 0x555555 : Phaser.Display.Color.HexStringToColor(FRUITS[this.currentFruitIdx]?.color || '#ffffff').color;
    for (let i = 0; i < 6; i++) {
      const trail = this.add.graphics();
      trail.fillStyle(trailColor, 0.4 - i * 0.06);
      trail.fillCircle(0, 0, 6 - i);
      trail.x = this.dropX;
      trail.y = (this.gravityDir === 1 ? 55 : GAME_H - 55) - i * 8 * this.gravityDir;
      this.tweens.add({
        targets: trail, alpha: 0, scaleX: 0.1, scaleY: 0.1,
        duration: 250 + i * 40,
        onComplete: () => trail.destroy()
      });
    }

    if (isBomb) {
      const b = BOMBS[0];
      const body = this.matter.add.circle(x, y, b.radius, {
        restitution: 0.25, friction: 0.5, frictionAir: 0.01, density: 0.002,
      }, 20);
      const gfx = this.createBombGraphic(x, y, 0, false);
      this.fruits.push({ body, gfx, fruitIdx: BOMB_MARKER, bombStage: 0 });
    } else {
      const f = FRUITS[idx];
      const body = this.matter.add.circle(x, y, f.radius, {
        restitution: 0.25, friction: 0.5, frictionAir: 0.01, density: 0.002,
      }, 20);
      const gfx = this.createFruitGraphic(x, y, idx, false);
      this.fruits.push({ body, gfx, fruitIdx: idx });
    }

    // Next: キューを1つ進める
    fruitQueue.shift();
    ensureQueue();
    drawNextQueue();

    this.time.delayedCall(500, () => {
      dropCooldown = false;
      canDrop = true;
      this.currentFruitIdx = fruitQueue[0].idx;
      this.currentIsBomb = fruitQueue[0].bomb;
      const previewY = this.gravityDir === 1 ? 42 : GAME_H - 42;
      this.isHoldingFruit = true; // 次のフルーツを構えた
      this.currentPreview = this.currentIsBomb
        ? this.createBombGraphic(this.dropX, previewY, 0, true)
        : this.createFruitGraphic(this.dropX, previewY, this.currentFruitIdx, true);
      this.updatePreview();
    });
  }

  handleCollision(bodyA, bodyB) {
    const a = this.fruits.find(f => f.body === bodyA);
    const b = this.fruits.find(f => f.body === bodyB);
    if (!a || !b) return;
    if (this.merging.has(a) || this.merging.has(b)) return;

    // Bomb collision — 💣+💣=💥(stage1)、💥+💣=爆発
    if (a.fruitIdx === BOMB_MARKER && b.fruitIdx === BOMB_MARKER) {
      this.merging.add(a); this.merging.add(b);
      const mx = (a.body.position.x + b.body.position.x) / 2;
      const my = (a.body.position.y + b.body.position.y) / 2;
      const maxStage = Math.max(a.bombStage ?? 0, b.bombStage ?? 0);
      const nextStage = maxStage + 1;
      this.removeFruit(a); this.removeFruit(b);
      if (nextStage >= 2) {
        // 3個目 → 爆発
        this.time.delayedCall(60, () => {
          this.explodeBomb(mx, my);
          this.merging.delete(a); this.merging.delete(b);
        });
      } else {
        // 2個目 → 💥に変化
        this.time.delayedCall(60, () => {
          const nb = BOMBS[1];
          const body = this.matter.add.circle(mx, my, nb.radius, {
            restitution: 0.25, friction: 0.5, frictionAir: 0.01, density: 0.002,
          }, 20);
          const gfx = this.createBombGraphic(mx, my, 1, false);
          this.fruits.push({ body, gfx, fruitIdx: BOMB_MARKER, bombStage: 1 });
          this.merging.delete(a); this.merging.delete(b);
        });
      }
      return;
    }

    // Normal fruit collision
    if (a.fruitIdx === BOMB_MARKER || b.fruitIdx === BOMB_MARKER) return;
    if (a.fruitIdx !== b.fruitIdx) return;
    if (a.fruitIdx >= FRUITS.length - 1) return;

    this.merging.add(a); this.merging.add(b);

    const mx = (a.body.position.x + b.body.position.x) / 2;
    const my = (a.body.position.y + b.body.position.y) / 2;
    const newIdx = a.fruitIdx + 1;

    // Remove old
    this.removeFruit(a); this.removeFruit(b);

    // Merge effect
    this.spawnMergeEffect(mx, my, a.fruitIdx);
    playMergeSound(newIdx);

    // Score
    const pts = FRUITS[newIdx].score;
    const prevLevel = Math.floor(gameScore / 1000);
    gameScore += pts;
    this.score = gameScore;
    document.getElementById('score-display').textContent = gameScore;
    this.onMerge(newIdx);

    // 背景・BGM切り替えチェック
    const newLevel = Math.floor(gameScore / 1000);
    if (newLevel > prevLevel) { quakeCharges += (newLevel - prevLevel); updateQuakeBtn(); }
    if (newLevel !== prevLevel) {
      this.drawBackground(gameScore, true);
      startBGM(this.currentBgLevel);
    }

    // Score popup
    const popup = this.add.text(mx, my - 20, '+' + pts, {
      fontSize: '20px', fontStyle: 'bold', color: '#FFD700',
      stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5);
    this.tweens.add({
      targets: popup, y: my - 70, alpha: 0, duration: 900,
      onComplete: () => popup.destroy()
    });

    // New fruit
    this.time.delayedCall(60, () => {
      const body = this.matter.add.circle(mx, my, FRUITS[newIdx].radius, {
        restitution: 0.25, friction: 0.5, frictionAir: 0.01, density: 0.002,
      }, 20);
      this.matter.body.setVelocity(body, { x: 0, y: -1 });
      const gfx = this.createFruitGraphic(mx, my, newIdx, false);
      const newFruit = { body, gfx, fruitIdx: newIdx };
      this.fruits.push(newFruit);
      this.merging.delete(a); this.merging.delete(b);
    });
  }

  loadBgPhotos() {
    const files = ['bg0_desert.jpg','bg1_city.jpg','bg2_forest.jpg','bg3_ocean.jpg','bg4_space.jpg'];
    files.forEach((f, i) => {
      const img = new Image();
      img.onload = () => {
        const key = 'bgphoto' + i;
        try {
          if (!this.textures.exists(key)) this.textures.addImage(key, img);
          if (this.currentBgLevel === i) this.applyBgPhoto(i);
        } catch (e) {}
      };
      img.src = f;
    });
  }

  applyBgPhoto(level) {
    const key = 'bgphoto' + level;
    if (!this.textures.exists(key)) return;
    if (this.bgPhoto) { this.bgPhoto.destroy(); this.bgPhoto = null; }
    this.bgPhoto = this.add.image(GAME_W/2, GAME_H/2, key).setDepth(-3);
    const src = this.textures.get(key).getSourceImage();
    const sc = Math.max(GAME_W / src.width, GAME_H / src.height);
    this.bgPhoto.setScale(sc);
  }

  drawBackground(score, animated = false) {
    const theme = getBgTheme(score);
    const level = BG_THEMES.indexOf(theme);
    if (level === this.currentBgLevel) return;
    this.currentBgLevel = level;

    // 既存パーティクル・アニメ削除
    this.bgParticles.forEach(p => { if(p.destroy) p.destroy(); });
    this.bgParticles = [];
    this.bgAnimItems.forEach(a => { if(a.destroy) a.destroy(); });
    this.bgAnimItems = [];
    this.bgGraphics.clear();

    const g = this.bgGraphics;
    const W = GAME_W, H = GAME_H;

    this.applyBgPhoto(level);
    // 視認性確保の暗オーバーレイ（上下を濃く）
    g.fillStyle(0x000000, 0.40); g.fillRect(0, 0, W, H);
    g.fillStyle(0x000000, 0.30); g.fillRect(0, 0, W, 96);
    g.fillStyle(0x000000, 0.30); g.fillRect(0, H - 96, W, 96);

    // ===== 動的アニメ =====
    if (level === 0) {
      // 砂漠：砂粒が右から左へ流れる
      for (let i = 0; i < 18; i++) {
        const sx = Math.random() * W;
        const sy = H * 0.5 + Math.random() * H * 0.45;
        const p = this.add.graphics().setDepth(-1);
        p.fillStyle(0xd4a96e, 0.25 + Math.random()*0.2);
        p.fillCircle(0, 0, 1 + Math.random()*2.5);
        p.x = sx; p.y = sy;
        this.bgAnimItems.push(p);
        this.tweens.add({
          targets: p, x: sx - W * (0.3 + Math.random()*0.4),
          y: sy + (Math.random()*30 - 15),
          duration: 3000 + Math.random()*3000,
          repeat: -1, ease: 'Linear',
          onRepeat: () => { p.x = W + 10; p.y = H*0.5+Math.random()*H*0.45; }
        });
      }
      // 砂漠：陽炎（ゆらゆら線）
      for (let i = 0; i < 5; i++) {
        const hx = WALL_T + 20 + i * ((W-WALL_T*2) / 5);
        const hy = H * 0.55 + Math.random() * H * 0.2;
        const hg = this.add.graphics().setDepth(-1);
        hg.lineStyle(1, 0xffcd3c, 0.08);
        hg.lineBetween(0, 0, 0, 30);
        hg.x = hx; hg.y = hy;
        this.bgAnimItems.push(hg);
        this.tweens.add({
          targets: hg, x: hx + 4, scaleY: 1.3, alpha: 0.04,
          duration: 800 + Math.random()*400, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
      }

    } else if (level === 1) {
      // 夜の街：窓がランダム点滅
      const winColors = [0xffeb3b, 0x80cbc4, 0xffa726, 0xef9a9a];
      for (let i = 0; i < 22; i++) {
        const wx = WALL_T + 10 + Math.random() * (W - WALL_T*2 - 20);
        const wy = H * 0.45 + Math.random() * H * 0.45;
        const wg = this.add.graphics().setDepth(-1);
        const wc = winColors[Math.floor(Math.random()*winColors.length)];
        wg.fillStyle(wc, 0.7);
        wg.fillRect(0, 0, 6, 8);
        wg.x = wx; wg.y = wy;
        this.bgAnimItems.push(wg);
        // ランダム点滅
        const blinkFn = () => {
          if (gameOver) return;
          const onTime = 800 + Math.random()*3000;
          const offTime = 500 + Math.random()*2000;
          this.tweens.add({
            targets: wg, alpha: 0, duration: 80,
            delay: onTime,
            onComplete: () => {
              this.tweens.add({ targets: wg, alpha: 0.7, duration: 80,
                delay: offTime, onComplete: blinkFn });
            }
          });
        };
        this.time.delayedCall(Math.random()*3000, blinkFn);
      }
      // 流れる車のライト
      for (let i = 0; i < 3; i++) {
        const cg = this.add.graphics().setDepth(-1);
        cg.fillStyle(0xffeb3b, 0.5); cg.fillCircle(0, 0, 2);
        cg.fillStyle(0xff4757, 0.4); cg.fillCircle(8, 0, 2);
        cg.x = -10; cg.y = H * 0.82 + i * 8;
        this.bgAnimItems.push(cg);
        this.tweens.add({
          targets: cg, x: W + 10,
          duration: 4000 + Math.random()*3000,
          delay: i * 2000,
          repeat: -1, ease: 'Linear'
        });
      }

    } else if (level === 2) {
      // 森：葉っぱが舞い落ちる
      const leafEmojis = ['🍃','🍂','🌿','🍀'];
      for (let i = 0; i < 12; i++) {
        const lx = WALL_T + 10 + Math.random()*(W-WALL_T*2-20);
        const leaf = this.add.text(lx, -20, leafEmojis[Math.floor(Math.random()*leafEmojis.length)], {
          fontSize: (10+Math.random()*10)+'px'
        }).setAlpha(0.55).setDepth(-1);
        this.bgAnimItems.push(leaf);
        const duration = 4000 + Math.random()*4000;
        this.tweens.add({
          targets: leaf,
          y: H + 20,
          x: lx + (Math.random()*80 - 40),
          rotation: Math.random()*Math.PI*4,
          duration, delay: Math.random()*5000,
          repeat: -1, ease: 'Linear',
          onRepeat: () => {
            leaf.x = WALL_T+10+Math.random()*(W-WALL_T*2-20);
            leaf.y = -20;
          }
        });
      }
      // 蛍がふわふわ
      for (let i = 0; i < 8; i++) {
        const fx = WALL_T+10+Math.random()*(W-WALL_T*2-20);
        const fy = H*0.3+Math.random()*H*0.5;
        const fg = this.add.graphics().setDepth(-1);
        fg.fillStyle(0xccff00, 0.6); fg.fillCircle(0, 0, 2.5);
        fg.x = fx; fg.y = fy;
        this.bgAnimItems.push(fg);
        this.tweens.add({
          targets: fg,
          x: fx + (Math.random()*60-30),
          y: fy + (Math.random()*60-30),
          alpha: 0.1,
          duration: 1500+Math.random()*1500,
          yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });
      }

    } else if (level === 3) {
      // 海：泡が下から上に浮かぶ
      for (let i = 0; i < 16; i++) {
        const bx = WALL_T+10+Math.random()*(W-WALL_T*2-20);
        const bg2 = this.add.graphics().setDepth(-1);
        bg2.lineStyle(1.5, 0x80deea, 0.4);
        bg2.strokeCircle(0, 0, 3+Math.random()*6);
        bg2.x = bx; bg2.y = H + 10;
        this.bgAnimItems.push(bg2);
        this.tweens.add({
          targets: bg2,
          y: -20,
          x: bx + (Math.random()*30-15),
          alpha: 0,
          duration: 3000+Math.random()*3000,
          delay: Math.random()*4000,
          repeat: -1, ease: 'Linear',
          onRepeat: () => { bg2.x = WALL_T+10+Math.random()*(W-WALL_T*2-20); bg2.y = H+10; bg2.alpha = 0.4; }
        });
      }
      // 魚が泳ぐ
      const fishEmojis = ['🐠','🐟','🐡'];
      for (let i = 0; i < 4; i++) {
        const fy = H*0.2+Math.random()*H*0.6;
        const dir = Math.random()>0.5 ? 1 : -1;
        const fish = this.add.text(dir>0?-20:W+20, fy, fishEmojis[i%fishEmojis.length], {
          fontSize:(14+Math.random()*10)+'px'
        }).setAlpha(0.5).setDepth(-1).setFlipX(dir<0);
        this.bgAnimItems.push(fish);
        this.tweens.add({
          targets: fish, x: dir>0?W+20:-20,
          duration: 5000+Math.random()*4000,
          delay: Math.random()*6000,
          repeat: -1, ease: 'Linear',
          onRepeat: () => {
            fish.x = dir>0?-20:W+20;
            fish.y = H*0.2+Math.random()*H*0.6;
          }
        });
      }

    } else {
      // 宇宙：流れ星・星のきらめき
      for (let i = 0; i < 8; i++) {
        const sg = this.add.graphics().setDepth(-1);
        sg.lineStyle(1.5, 0xffffff, 0.7);
        sg.lineBetween(0, 0, 20, 6);
        sg.x = W + 30; sg.y = Math.random()*H*0.5;
        this.bgAnimItems.push(sg);
        this.tweens.add({
          targets: sg, x: -30, y: sg.y + 80,
          duration: 1500+Math.random()*2000,
          delay: Math.random()*8000,
          repeat: -1, ease: 'Linear',
          onRepeat: () => { sg.x = W+30; sg.y = Math.random()*H*0.5; }
        });
      }
      // 星のきらめき
      for (let i = 0; i < 20; i++) {
        const sx = Math.random()*W, sy = Math.random()*H;
        const sg2 = this.add.graphics().setDepth(-1);
        sg2.fillStyle(0xffffff, 0.8); sg2.fillCircle(sx, sy, 1.2);
        this.bgAnimItems.push(sg2);
        this.tweens.add({
          targets: sg2, alpha: 0.1,
          duration: 800+Math.random()*1200,
          yoyo: true, repeat: -1,
          delay: Math.random()*3000,
          ease: 'Sine.easeInOut'
        });
      }
      // 惑星の輪が回る
      const ringG = this.add.graphics().setDepth(-1);
      ringG.lineStyle(2, 0x90caf9, 0.3);
      ringG.strokeEllipse(W*0.8, H*0.15, 50, 12);
      this.bgAnimItems.push(ringG);
      this.tweens.add({
        targets: ringG, scaleX: 1.15, scaleY: 0.85,
        duration: 3000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
      });
    }

    // 切り替え演出
    if (animated) {
      const themeName = this.add.text(GAME_W/2, GAME_H/2, theme.name, {
        fontSize: '26px', fontStyle: 'bold', color: '#ffffff',
        stroke: '#000', strokeThickness: 4
      }).setOrigin(0.5).setDepth(15).setAlpha(0);
      this.tweens.add({
        targets: themeName, alpha: 1, y: GAME_H/2 - 20,
        duration: 400, hold: 800, yoyo: true,
        onComplete: () => themeName.destroy()
      });
      this.cameras.main.flash(500, 255, 255, 255, false);
    }
  }

  removeFruit(fruit) {
    this.fruits = this.fruits.filter(f => f !== fruit);
    fruit.gfx.g.destroy();
    fruit.gfx.txt.destroy();
    this.matter.world.remove(fruit.body);
  }

  createBombGraphic(x, y, stage, isPreview = false) {
    const b = BOMBS[stage];
    const alpha = isPreview ? 0.55 : 1.0;
    const g = this.add.graphics();
    g.fillStyle(0x222222, alpha * 0.4);
    g.fillCircle(0, 0, b.radius + 4);
    g.fillStyle(Phaser.Display.Color.HexStringToColor(b.color).color, alpha);
    g.fillCircle(0, 0, b.radius);
    g.fillStyle(0xffffff, 0.2);
    g.fillCircle(-b.radius * 0.25, -b.radius * 0.25, b.radius * 0.3);
    // 白枠
    g.lineStyle(2, 0xffffff, isPreview ? 0.4 : 0.7);
    g.strokeCircle(0, 0, b.radius);
    g.x = x; g.y = y;
    const txt = this.add.text(x, y, b.emoji, {
      fontSize: Math.floor(b.radius * 1.7) + 'px', align: 'center'
    }).setOrigin(0.5, 0.52).setAlpha(alpha);
    return { g, txt, fruitIdx: BOMB_MARKER };
  }

  explodeBomb(x, y, chain = 0, explodedSet = null) {
    if (!explodedSet) explodedSet = new Set();
    const key = Math.round(x) + '_' + Math.round(y);
    if (explodedSet.has(key)) return;
    explodedSet.add(key);

    const EXPLODE_RADIUS = 120;

    // エフェクト
    const colors = [0xFF4500, 0xFF6600, 0xFFD700, 0xFF0000, 0xFFA500];
    const particleCount = 30 + chain * 8;
    for (let i = 0; i < particleCount; i++) {
      const angle = (i / particleCount) * Math.PI * 2;
      const speed = 80 + chain * 20 + Math.random() * 120;
      const p = this.add.graphics();
      p.fillStyle(colors[i % colors.length], 1);
      p.fillCircle(0, 0, 4 + chain * 1.5 + Math.random() * 6);
      p.x = x; p.y = y;
      this.tweens.add({
        targets: p,
        x: x + Math.cos(angle) * speed,
        y: y + Math.sin(angle) * speed,
        alpha: 0, scaleX: 0.1, scaleY: 0.1,
        duration: 700 + Math.random() * 400,
        onComplete: () => p.destroy()
      });
    }
    // リング（連鎖するほど大きく）
    const ring = this.add.graphics();
    ring.lineStyle(6 + chain, 0xFF4500, 1);
    ring.strokeCircle(x, y, 10);
    this.tweens.add({
      targets: ring, scaleX: 8 + chain * 2, scaleY: 8 + chain * 2, alpha: 0, duration: 600,
      onComplete: () => ring.destroy()
    });
    // フラッシュ
    const flashAlpha = Math.min(0.35 + chain * 0.1, 0.7);
    const flash = this.add.rectangle(GAME_W/2, GAME_H/2, GAME_W, GAME_H, 0xFF6600, flashAlpha);
    this.tweens.add({ targets: flash, alpha: 0, duration: 400, onComplete: () => flash.destroy() });
    // シェイク（連鎖するほど強く）
    this.cameras.main.shake(300 + chain * 50, 0.008 + chain * 0.004);

    // BOOMテキスト（連鎖時は CHAIN x2! など）
    const boomText = chain === 0 ? '💥 BOOM!' : '💥 CHAIN x' + (chain + 1) + '!';
    const boomColor = chain === 0 ? '#FF6600' : '#FF0000';
    const boom = this.add.text(x, y - 20, boomText, {
      fontSize: (28 + chain * 4) + 'px', fontStyle: 'bold', color: boomColor,
      stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5);
    this.tweens.add({
      targets: boom, y: y - 100, alpha: 0, scaleX: 1.5, scaleY: 1.5,
      duration: 1000, onComplete: () => boom.destroy()
    });

    // 爆発音（連鎖するほど低く）
    if (soundEnabled) {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        const baseFreq = Math.max(60, 150 - chain * 20);
        osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.5, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(); osc.stop(ctx.currentTime + 0.6);
      } catch(e) {}
    }

    // 範囲内のフルーツと爆弾を仕分け
    const inRange = this.fruits.filter(fruit => {
      const dx = fruit.body.position.x - x;
      const dy = fruit.body.position.y - y;
      return Math.sqrt(dx*dx + dy*dy) < EXPLODE_RADIUS;
    });
    const bombsInRange = inRange.filter(f => f.fruitIdx === BOMB_MARKER);
    const fruitsInRange = inRange.filter(f => f.fruitIdx !== BOMB_MARKER);

    // 消えるフルーツの位置とサイズを記録
    const removedPositions = fruitsInRange.map(fruit => ({
      x: fruit.body.position.x,
      y: fruit.body.position.y,
      r: FRUITS[fruit.fruitIdx] ? FRUITS[fruit.fruitIdx].radius : 20,
    }));

    // 通常フルーツを消す
    fruitsInRange.forEach(fruit => this.removeFruit(fruit));

    // 消えたフルーツに「接触していた」爆弾を探して誘爆
    // ＋ 爆発半径内の爆弾も誘爆（既存ルール）
    const chainBombs = new Set();
    bombsInRange.forEach(b => chainBombs.add(b));

    // 消えたフルーツに触れていた爆弾を追加
    this.fruits.forEach(fruit => {
      if (fruit.fruitIdx !== BOMB_MARKER) return;
      if (chainBombs.has(fruit)) return;
      const bx = fruit.body.position.x;
      const by = fruit.body.position.y;
      const br = BOMBS[fruit.bombStage ?? 0].radius;
      for (const pos of removedPositions) {
        const dx = bx - pos.x;
        const dy = by - pos.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < br + pos.r + 4) { // 接触判定（半径の和＋少し余裕）
          chainBombs.add(fruit);
          break;
        }
      }
    });

    // 誘爆（少し遅らせて順番に）
    let idx = 0;
    chainBombs.forEach(bomb => {
      const bx = bomb.body.position.x;
      const by = bomb.body.position.y;
      this.removeFruit(bomb);
      this.time.delayedCall(200 + idx * 150, () => {
        this.explodeBomb(bx, by, chain + 1, explodedSet);
      });
      idx++;
    });
  }

  spawnMergeEffect(x, y, level) {
    const palettes = [
      [0xFFD700, 0xFFF176, 0xFF8F00],
      [0xFF6B6B, 0xFF1744, 0xFF8A80],
      [0x4ECDC4, 0x00E5FF, 0x80DEEA],
      [0xA8E063, 0x76FF03, 0xCCFF90],
      [0xFF9F43, 0xFF6D00, 0xFFD180],
      [0xE040FB, 0xD500F9, 0xEA80FC],
      [0x40C4FF, 0x0091EA, 0x80D8FF],
      [0xFF4081, 0xF50057, 0xFF80AB],
      [0x69F0AE, 0x00E676, 0xB9F6CA],
      [0xFFFF00, 0xFFD600, 0xFFFF8D],
      [0xFF3D00, 0xDD2C00, 0xFF9E80],
    ];
    const cols = palettes[level % palettes.length];
    const r = level < FRUITS.length ? FRUITS[level].radius : 50;

    // 1. 内側から広がる多重リング
    for (let ri = 0; ri < 3; ri++) {
      const ring = this.add.graphics();
      ring.lineStyle(4 - ri, cols[ri % cols.length], 1);
      ring.strokeCircle(x, y, r * 0.5);
      ring.x = x; ring.y = y;
      this.tweens.add({
        targets: ring,
        scaleX: 3.5 + ri * 1.2,
        scaleY: 3.5 + ri * 1.2,
        alpha: 0,
        duration: 500 + ri * 120,
        delay: ri * 60,
        ease: 'Cubic.easeOut',
        onComplete: () => ring.destroy()
      });
    }

    // 2. 大量パーティクル（3層・レベルで増加）
    const layerDefs = [
      { count: 24 + level * 3, baseSpeed: 90,  size: [3,6],  shape: 'circle', delay: 0   },
      { count: 16 + level * 2, baseSpeed: 160, size: [2,4],  shape: 'tri',    delay: 40  },
      { count: 10 + level,     baseSpeed: 230, size: [1,3],  shape: 'circle', delay: 80  },
    ];
    layerDefs.forEach((def, layer) => {
      for (let i = 0; i < def.count; i++) {
        const angle = (i / def.count) * Math.PI * 2 + (layer * Math.PI / def.count);
        const speed = def.baseSpeed + Math.random() * 80;
        const size = def.size[0] + Math.random() * (def.size[1] - def.size[0]);
        const p = this.add.graphics();
        p.fillStyle(cols[i % cols.length], 1);
        if (def.shape === 'tri') {
          p.fillTriangle(-size, size, size, size, 0, -size * 1.6);
        } else {
          p.fillCircle(0, 0, size);
        }
        p.x = x; p.y = y;
        this.tweens.add({
          targets: p,
          x: x + Math.cos(angle) * speed,
          y: y + Math.sin(angle) * speed,
          alpha: 0,
          scaleX: 0.1, scaleY: 0.1,
          rotation: Math.random() * Math.PI * 6,
          duration: 500 + Math.random() * 600,
          delay: def.delay + Math.random() * 30,
          ease: 'Cubic.easeOut',
          onComplete: () => p.destroy()
        });
      }
    });

    // 2b. レベル高いほど放射状の線（スパーク）
    if (level >= 4) {
      const sparkCount = 8 + level * 2;
      for (let i = 0; i < sparkCount; i++) {
        const angle = (i / sparkCount) * Math.PI * 2;
        const len = 30 + level * 8 + Math.random() * 30;
        const sg = this.add.graphics();
        sg.lineStyle(1.5, cols[i % cols.length], 1);
        sg.lineBetween(0, 0, Math.cos(angle)*len*0.3, Math.sin(angle)*len*0.3);
        sg.x = x; sg.y = y;
        this.tweens.add({
          targets: sg,
          x: x + Math.cos(angle) * len,
          y: y + Math.sin(angle) * len,
          alpha: 0, scaleX: 0.3, scaleY: 0.3,
          duration: 350 + Math.random() * 200,
          ease: 'Cubic.easeOut',
          onComplete: () => sg.destroy()
        });
      }
    }

    // 2c. レベル最大付近は紙吹雪（四角）
    if (level >= 7) {
      for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed2 = 80 + Math.random() * 150;
        const conf = this.add.graphics();
        conf.fillStyle(cols[i % cols.length], 1);
        conf.fillRect(0, 0, 4 + Math.random()*4, 3 + Math.random()*3);
        conf.x = x; conf.y = y;
        this.tweens.add({
          targets: conf,
          x: x + Math.cos(angle) * speed2,
          y: y + Math.sin(angle) * speed2 + 40,
          alpha: 0, rotation: Math.random() * Math.PI * 8,
          duration: 700 + Math.random() * 500,
          ease: 'Cubic.easeOut',
          onComplete: () => conf.destroy()
        });
      }
    }

    // 3. 中心フラッシュ（白い円が一瞬膨らむ）
    const flash = this.add.graphics();
    flash.fillStyle(0xffffff, 0.9);
    flash.fillCircle(x, y, r * 0.8);
    this.tweens.add({
      targets: flash,
      scaleX: 2.5, scaleY: 2.5, alpha: 0,
      duration: 300,
      ease: 'Cubic.easeOut',
      onComplete: () => flash.destroy()
    });

    // 4. レベルが高いほど画面が少し揺れる演出（カメラシェイク風）
    if (level >= 6) {
      const shakeAmt = Math.min((level - 5) * 3, 12);
      this.cameras.main.shake(200, shakeAmt / 1000);
    }

    // 5. スコアレベルに応じたテキスト演出
    const labels = ['', '', '', 'NICE!', 'GOOD!', 'GREAT!', 'AMAZING!', 'PERFECT!', 'ULTRA!!', 'SUPER!!', 'MAX!!!'];
    if (level >= 3) {
      const label = labels[Math.min(level, labels.length - 1)];
      const textColors = ['#FFD700','#FF6B6B','#4ECDC4','#A8E063','#FF9F43','#E040FB','#40C4FF','#FF4081','#69F0AE'];
      const lbl = this.add.text(x, y - r - 10, label, {
        fontSize: Math.min(14 + level * 2, 32) + 'px',
        fontStyle: 'bold',
        color: textColors[level % textColors.length],
        stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5);
      this.tweens.add({
        targets: lbl,
        y: y - r - 50,
        alpha: 0,
        scaleX: 1.4, scaleY: 1.4,
        duration: 800,
        ease: 'Back.easeOut',
        onComplete: () => lbl.destroy()
      });
    }
  }

  update(time, delta) {
    if (gameOver) return;

    // Sync graphics to physics
    this.fruits.forEach(fruit => {
      const pos = fruit.body.position;
      const angle = fruit.body.angle;
      fruit.gfx.g.x = pos.x;
      fruit.gfx.g.y = pos.y;
      fruit.gfx.g.rotation = angle;
      fruit.gfx.txt.x = pos.x;
      fruit.gfx.txt.y = pos.y;
      fruit.gfx.txt.rotation = angle;
    });

    // 反転猶予タイマー
    if (this.flipGracePeriod > 0) this.flipGracePeriod -= delta;
    if (this.quakeGrace > 0) this.quakeGrace -= delta;

    // タイムアタック：カウントダウン
    if (this.modeKind === 'time') {
      this.timeLeft -= delta;
      this.updateHud();
      if (this.timeLeft <= 0) { this.timeLeft = 0; this.triggerGameOver('TIME UP'); return; }
    }

    // 重力反転タイマー（反転モードのみ）
    if (!this.flipEnabled) {
      // 通常モード：ゲームオーバー判定のみ（下方向固定）
      if (!dropCooldown && this.quakeGrace <= 0) {
        for (const fruit of this.fruits) {
          const vel = fruit.body.velocity;
          const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y);
          if (fruit.body.position.y < 80 && speed < 0.5) {
            this.triggerGameOver();
            return;
          }
        }
      }
      return;
    }
    this.gravityTimer += delta;
    const remaining = this.gravityInterval - this.gravityTimer;
    const progress = this.gravityTimer / this.gravityInterval;

    // カウントダウンバー描画
    this.gravityBar.clear();
    const barW = (GAME_W - WALL_T * 2) * (1 - progress);
    const barColor = remaining < 1500 ? 0xFF4444 : (remaining < 3000 ? 0xFF9900 : 0x4488FF);
    this.gravityBar.fillStyle(barColor, 0.7);
    this.gravityBar.fillRect(WALL_T, GAME_H - FLOOR_T - 6, barW, 4);

    // カウントダウン（残り3秒から）
    if (remaining <= 3000) {
      this.warningActive = true;
      const countNum = Math.ceil(remaining / 1000); // 3,2,1
      if (countNum !== this.lastCountNum && countNum >= 1) {
        this.lastCountNum = countNum;
        const isLast = countNum === 1;
        const dir = this.gravityDir === 1 ? '⬆' : '⬇';
        this.warningText.setText(isLast ? '果物を離せ！' : String(countNum));
        this.warningText.setStyle({
          fontSize: isLast ? '32px' : '64px',
          fontStyle: 'bold',
          color: isLast ? '#FF4444' : (countNum === 2 ? '#FF9900' : '#FFFF00'),
          stroke: '#000',
          strokeThickness: 6
        });
        this.warningText.setAlpha(1).setScale(1.5);
        this.tweens.killTweensOf(this.warningText);
        this.tweens.add({
          targets: this.warningText,
          scaleX: 1, scaleY: 1,
          duration: 150,
          ease: 'Back.easeOut',
          onComplete: () => {
            if (!isLast) {
              this.tweens.add({
                targets: this.warningText,
                alpha: 0, duration: 600, delay: 200
              });
            } else {
              this.tweens.add({
                targets: this.warningText,
                alpha: 0, duration: 300, delay: 400
              });
            }
          }
        });
        // カウント音
        if (soundEnabled) {
          try {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.value = isLast ? 880 : 660;
            g.gain.setValueAtTime(0.2, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            osc.start(); osc.stop(ctx.currentTime + 0.15);
          } catch(e) {}
        }
      }
    }

    // 重力反転実行
    if (this.gravityTimer >= this.gravityInterval) {
      this.gravityTimer = 0;
      this.gravityInterval = [30000, 45000, 60000][Math.floor(Math.random() * 3)]; // 次回もランダム
      this.warningShown = false;
      this.lastCountNum = -1;
      const releasedSafely = this.releasedDuringWarning;
      this.releasedDuringWarning = false;
      this.warningActive = false;
      this.gravityDir *= -1;
      this.matter.world.setGravity(0, 2 * this.gravityDir);
      this.flipGracePeriod = 2000; // 反転後2秒はゲームオーバー判定しない

      // フルーツを構えている間だけライフ減少
      if (!releasedSafely) {
        playerLife--;
        updateLifeDisplay();

        // ダメージエフェクト
        const dmg = this.add.text(GAME_W / 2, GAME_H / 2 - 40, '💔 -1', {
          fontSize: '36px', fontStyle: 'bold', color: '#FF4444',
          stroke: '#000', strokeThickness: 4
        }).setOrigin(0.5).setDepth(20);
        this.tweens.add({
          targets: dmg, y: GAME_H / 2 - 100, alpha: 0, duration: 1000,
          onComplete: () => dmg.destroy()
        });

        // 赤点滅（3回）
        const redFlash = this.add.rectangle(GAME_W/2, GAME_H/2, GAME_W, GAME_H, 0xFF0000, 0).setDepth(19);
        this.tweens.add({
          targets: redFlash,
          alpha: { from: 0, to: 0.45 },
          duration: 120,
          yoyo: true,
          repeat: 2,
          onComplete: () => redFlash.destroy()
        });

        // 画面揺れ（強め）
        this.cameras.main.shake(500, 0.022);

        // CSS側でも赤枠を点滅
        const canvas = document.querySelector('#phaser-game canvas');
        if (canvas) {
          canvas.style.transition = 'box-shadow 0.1s';
          canvas.style.boxShadow = '0 0 0 6px #FF0000';
          setTimeout(() => { canvas.style.boxShadow = '0 0 0 6px #FF000088'; }, 120);
          setTimeout(() => { canvas.style.boxShadow = '0 0 0 6px #FF0000'; }, 240);
          setTimeout(() => { canvas.style.boxShadow = 'none'; canvas.style.transition = ''; }, 500);
        }

        // ライフ0でゲームオーバー
        if (playerLife <= 0) {
          this.time.delayedCall(500, () => this.triggerGameOver());
        }
      }

      // 境界を反転（天井・床どちらも有効）
      this.matter.world.setBounds(WALL_T, 0, GAME_W - WALL_T * 2, GAME_H - FLOOR_T, 64, true, true, true, true);

      // インジケーター更新
      this.gravityIndicator.setText(this.gravityDir === 1 ? '⬇' : '⬆');

      // 反転エフェクト
      this.cameras.main.shake(300, 0.012);
      const flipFlash = this.add.rectangle(GAME_W/2, GAME_H/2, GAME_W, GAME_H, 0x4488FF, 0.3);
      this.tweens.add({ targets: flipFlash, alpha: 0, duration: 500, onComplete: () => flipFlash.destroy() });

      // 反転音
      if (soundEnabled) {
        try {
          const ctx = getAudioCtx();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(this.gravityDir === 1 ? 800 : 400, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(this.gravityDir === 1 ? 400 : 800, ctx.currentTime + 0.3);
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
          osc.start(); osc.stop(ctx.currentTime + 0.4);
        } catch(e) {}
      }
    }

    // ゲームオーバー判定（重力方向に応じて危険ラインを変える）
    if (!dropCooldown && !(this.flipGracePeriod > 0) && this.quakeGrace <= 0) {
      for (const fruit of this.fruits) {
        const vel = fruit.body.velocity;
        const speed = Math.sqrt(vel.x * vel.x + vel.y * vel.y);
        const isOverLimit = this.gravityDir === 1
          ? fruit.body.position.y < 80
          : fruit.body.position.y > GAME_H - 80;
        if (isOverLimit && speed < 0.5) {
          this.triggerGameOver();
          return;
        }
      }
    }
  }

  updateHud() {
    if (!this.hud) return;
    if (this.modeKind === 'time') {
      const s = Math.max(0, Math.ceil(this.timeLeft / 1000));
      const m = Math.floor(s / 60), ss = ('0' + (s % 60)).slice(-2);
      this.hud.setText('\u23F1 ' + m + ':' + ss);
      this.hud.setColor(this.timeLeft <= 10000 ? '#ff5555' : '#ffffff');
    } else if (this.modeKind === 'mission') {
      const mi = this.missions[this.missionIndex];
      this.hud.setText(mi ? ('\uD83C\uDFAF ' + mi.label) : '');
      this.hud.setColor('#9be89b');
    } else if (this.modeKind === 'shape') {
      const sl = { funnel:'漏斗', hourglass:'砂時計', pillar:'障害物' };
      this.hud.setText('\uD83E\uDDE9 ' + (sl[this.shapeKind] || '変形ステージ'));
      this.hud.setColor('#c9a6ff');
    } else {
      this.hud.setText('');
    }
  }

  onMerge(newIdx) {
    if (this.modeKind === 'mission' && !gameOver) this.checkMission(newIdx);
  }

  checkMission(eventIdx) {
    if (this.modeKind !== 'mission' || gameOver) return;
    let advanced = false;
    while (this.missionIndex < this.missions.length) {
      const m = this.missions[this.missionIndex];
      const done = (m.type === 'score') ? (gameScore >= m.val)
                 : (m.type === 'create' && eventIdx === m.idx);
      if (!done) break;
      this.showMissionClear(m.label);
      this.missionIndex++;
      advanced = true;
      eventIdx = -1;
    }
    if (advanced) this.updateHud();
    if (this.missionIndex >= this.missions.length) {
      this.time.delayedCall(700, () => this.triggerWin());
    }
  }

  showMissionClear(label) {
    const t = this.add.text(GAME_W/2, GAME_H/2 - 40, 'ミッションクリア！\n' + label, {
      fontSize:'22px', fontStyle:'bold', color:'#9be89b',
      stroke:'#000', strokeThickness:5, align:'center'
    }).setOrigin(0.5).setDepth(20).setAlpha(0);
    this.tweens.add({ targets:t, alpha:1, y:GAME_H/2 - 70, duration:400, hold:900, yoyo:true,
      onComplete:() => t.destroy() });
    this.cameras.main.flash(300, 150, 230, 150, false);
    try { playMergeSound(8); } catch (e) {}
  }

  triggerWin() {
    if (gameOver) return;
    gameOver = true; canDrop = false; stopBGM();
    this.cameras.main.flash(500, 180, 240, 180, false);
    const t = this.add.text(GAME_W/2, GAME_H/2, '\uD83C\uDF89\nCLEAR!', {
      fontSize:'48px', fontStyle:'bold', color:'#7CFC00',
      stroke:'#000', strokeThickness:6, align:'center'
    }).setOrigin(0.5).setDepth(20).setScale(2).setAlpha(0);
    this.tweens.add({ targets:t, alpha:1, scaleX:1, scaleY:1, duration:400, ease:'Back.easeOut' });
    this.time.delayedCall(1400, () => {
      t.destroy();
      const isNew = saveRanking(gameScore);
      document.getElementById('final-score').textContent = gameScore;
      const h2 = document.querySelector('#gameover-modal h2');
      if (h2) h2.textContent = '🎉 ミッションクリア';
      document.getElementById('new-record-msg').style.display = isNew ? 'block' : 'none';
      document.getElementById('overlay').classList.remove('hidden');
      document.getElementById('best-display').textContent = getBest();
    });
  }

  doEarthquake() {
    if (gameOver) return;
    const MB = Phaser.Physics.Matter.Matter.Body;
    const horizontal = Math.random() < 0.5;
    this.quakeGrace = 2200;
    this.cameras.main.shake(650, horizontal ? 0.03 : 0.022);
    this.fruits.forEach(f => {
      let vx, vy;
      if (horizontal) { vx = (Math.random() * 2 - 1) * 13; vy = -(1 + Math.random() * 5); }
      else { vx = (Math.random() * 2 - 1) * 5; vy = -(6 + Math.random() * 9); }
      try { MB.setVelocity(f.body, { x: vx, y: vy }); MB.setAngularVelocity(f.body, (Math.random() * 2 - 1) * 0.3); } catch (e) {}
    });
    if (soundEnabled) {
      try {
        const ctx = getAudioCtx();
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(90, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(28, ctx.currentTime + 0.5);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime + 0.6);
      } catch (e) {}
    }
    const label = horizontal ? '横揺れ！' : '縦揺れ！';
    const t = this.add.text(GAME_W / 2, 70, label, { fontSize:'24px', fontStyle:'bold', color:'#ffcc66', stroke:'#000', strokeThickness:4 }).setOrigin(0.5).setDepth(20).setAlpha(0);
    this.tweens.add({ targets:t, alpha:1, duration:200, hold:600, yoyo:true, onComplete:() => t.destroy() });
  }

  buildShape() {
    const W = GAME_W, H = GAME_H, col = 0x3a2a6e, al = 0.75, floorY = H - FLOOR_T;
    const kinds = ['funnel', 'pillar'];
    this.shapeKind = kinds[Math.floor(Math.random() * kinds.length)];
    // 2点を結ぶ斜め壁（低摩擦でフルーツが必ず滑り落ちる）
    const barAB = (x1, y1, x2, y2, th) => {
      const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
      const len = Math.hypot(x2 - x1, y2 - y1);
      const ang = Math.atan2(y2 - y1, x2 - x1);
      this.matter.add.rectangle(cx, cy, len, th, { isStatic: true, angle: ang, friction: 0.04, chamfer: { radius: 4 } });
      this.add.rectangle(cx, cy, len, th, 0x6a3fd6, 0.92).setRotation(ang).setStrokeStyle(4, 0x66f0ff, 1).setDepth(1);
    };
    const addPeg = (cx, cy, r) => {
      this.matter.add.circle(cx, cy, r, { isStatic: true, friction: 0.02, restitution: 0.4 });
      this.add.circle(cx, cy, r, 0x6a3fd6, 0.92).setStrokeStyle(4, 0x66f0ff, 1).setDepth(1);
    };
    if (this.shapeKind === 'funnel') {
      // 斜め線は片方だけ・少し上に配置（フルーツは広く落ちる）
      barAB(W * 0.5 - 135, H * 0.46, W * 0.5 - 78, H * 0.60, 16);
    } else {
      // 中央の浮いた棒（下にスイカが通る隙間）。左右のピンは無し
      barAB(W * 0.5, floorY - 200, W * 0.5, floorY - 360, 22);
    }
    this.updateHud();
  }

  triggerGameOver(reason) {
    if (gameOver) return;
    gameOver = true;
    canDrop = false;
    stopBGM();

    // 1. 強いシェイク
    this.cameras.main.shake(600, 0.03);

    // 2. 赤フラッシュ3連
    const flash = this.add.rectangle(GAME_W/2, GAME_H/2, GAME_W, GAME_H, 0xff0000, 0);
    this.tweens.add({
      targets: flash, alpha: { from: 0, to: 0.6 },
      duration: 100, yoyo: true, repeat: 2,
      onComplete: () => flash.destroy()
    });

    // 3. 全フルーツが弾け飛ぶ
    this.fruits.forEach((fruit, i) => {
      const angle = Math.random() * Math.PI * 2;
      const speed = 200 + Math.random() * 200;
      this.tweens.add({
        targets: [fruit.gfx.g, fruit.gfx.txt],
        x: fruit.body.position.x + Math.cos(angle) * speed,
        y: fruit.body.position.y + Math.sin(angle) * speed,
        alpha: 0, rotation: Math.random() * Math.PI * 4,
        scaleX: 0.1, scaleY: 0.1,
        duration: 600 + Math.random() * 300,
        delay: i * 20,
        ease: 'Cubic.easeOut'
      });
    });

    // 4. GAME OVER テキスト
    const goText = this.add.text(GAME_W/2, GAME_H/2, (reason === 'TIME UP' ? 'TIME\nUP!' : 'GAME\nOVER'), {
      fontSize: '52px', fontStyle: 'bold', color: '#FF0000',
      stroke: '#000', strokeThickness: 6, align: 'center'
    }).setOrigin(0.5).setAlpha(0).setDepth(20).setScale(2);
    this.tweens.add({
      targets: goText, alpha: 1, scaleX: 1, scaleY: 1,
      duration: 400, ease: 'Back.easeOut'
    });

    // 5. 破片パーティクル
    const colors = [0xFF0000, 0xFF4444, 0xFF8888, 0xFFFFFF];
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 100 + Math.random() * 200;
      const p = this.add.graphics().setDepth(18);
      p.fillStyle(colors[i % colors.length], 1);
      p.fillRect(0, 0, 3 + Math.random()*5, 3 + Math.random()*5);
      p.x = GAME_W/2; p.y = GAME_H/2;
      this.tweens.add({
        targets: p,
        x: GAME_W/2 + Math.cos(angle)*speed,
        y: GAME_H/2 + Math.sin(angle)*speed,
        alpha: 0, rotation: Math.random()*Math.PI*6,
        duration: 800 + Math.random()*400,
        ease: 'Cubic.easeOut',
        onComplete: () => p.destroy()
      });
    }

    // 6. ゲームオーバー音
    if (soundEnabled) {
      try {
        const ctx = getAudioCtx();
        [0, 0.15, 0.3].forEach((delay, i) => {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(300 - i*80, ctx.currentTime + delay);
          osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + delay + 0.4);
          g.gain.setValueAtTime(0.3, ctx.currentTime + delay);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.5);
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + 0.5);
        });
      } catch(e) {}
    }

    this.time.delayedCall(1200, () => {
      goText.destroy();
      const isNew = saveRanking(gameScore);
      document.getElementById('final-score').textContent = gameScore;
      document.getElementById('new-record-msg').style.display = isNew ? 'block' : 'none';
      const h2 = document.querySelector('#gameover-modal h2');
      if (h2) h2.textContent = (reason === 'TIME UP') ? '⏱ TIME UP' : '🍉 GAME OVER';
      document.getElementById('overlay').classList.remove('hidden');
      const best = getBest();
      document.getElementById('best-display').textContent = best;
    });
  }
}

const config = {
  type: Phaser.AUTO,
  width: GAME_W,
  height: GAME_H,
  backgroundColor: '#000000',
  parent: 'phaser-game',
  banner: false,
  physics: {
    default: 'matter',
    matter: {
      gravity: { y: 2 },
      debug: false,
    }
  },
  scene: [GameScene],
};

let game = new Phaser.Game(config);
game.scene.stop('GameScene'); // タイトル画面から始める

// ===================== UI BUTTONS =====================
document.getElementById('btn-restart').addEventListener('click', restartGame);
document.getElementById('restart-btn').addEventListener('click', restartGame);

function restartGame() {
  document.getElementById('overlay').classList.add('hidden');
  gameScore = 0;
  document.getElementById('score-display').textContent = '0';
  resetQueue();
  drawNextQueue();
  game.scene.stop('GameScene');
  game.scene.start('GameScene');
}

document.getElementById('btn-sound').addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  document.getElementById('btn-sound').textContent = soundEnabled ? '🔊 音' : '🔇 音';
  if (!soundEnabled) {
    stopBGM();
  } else {
    startBGM(bgmLevel >= 0 ? bgmLevel : 0);
  }
});

function updateQuakeBtn() {
  const b = document.getElementById('btn-quake');
  if (!b) return;
  b.textContent = '🌐 ' + quakeCharges;
  b.disabled = (quakeCharges <= 0);
  b.style.opacity = quakeCharges > 0 ? '1' : '0.45';
}
document.getElementById('btn-quake').addEventListener('click', () => {
  if (quakeCharges <= 0 || gameOver) return;
  const sc = game.scene.getScene('GameScene');
  if (!sc || !game.scene.isActive('GameScene')) return;
  quakeCharges--; updateQuakeBtn();
  sc.doEarthquake();
});

// ===================== TITLE SCREEN =====================
document.getElementById('btn-mode-normal').addEventListener('click', () => {
  gameMode = 'normal';
  applyFieldWidth('normal');
  try { startBGM(0); } catch (e) {}
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-container').style.display = 'flex';
  resetQueue();
  drawNextQueue();
  game.scene.start('GameScene');
});
document.getElementById('btn-mode-flip').addEventListener('click', () => {
  gameMode = 'flip';
  applyFieldWidth('flip');
  try { startBGM(0); } catch (e) {}
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-container').style.display = 'flex';
  resetQueue();
  drawNextQueue();
  game.scene.start('GameScene');
});
function applyFieldWidth(mode) {
  GAME_W = (mode === 'shape') ? Math.min(Math.round(BASE_W * 1.5), window.innerWidth) : BASE_W;
  try { game.scale.resize(GAME_W, GAME_H); } catch (e) {}
  const wpx = GAME_W + 'px';
  ['ui-bar', 'bottom-bar'].forEach(id => { const el = document.getElementById(id); if (el) el.style.maxWidth = wpx; });
}
function _startMode(mode) {
  gameMode = mode;
  applyFieldWidth(mode);
  try { startBGM(0); } catch (e) {}
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-container').style.display = 'flex';
  resetQueue();
  drawNextQueue();
  game.scene.start('GameScene');
}
document.getElementById('btn-mode-time').addEventListener('click', () => _startMode('time'));
document.getElementById('btn-mode-mission').addEventListener('click', () => _startMode('mission'));
document.getElementById('btn-mode-shape').addEventListener('click', () => _startMode('shape'));
document.getElementById('btn-bomb-toggle').addEventListener('click', () => {
  bombEnabled = !bombEnabled;
  document.getElementById('btn-bomb-toggle').textContent = bombEnabled ? '💣 爆弾: あり' : '💣 爆弾: なし';
});

// リスタート時にタイトルに戻る
document.getElementById('btn-restart').removeEventListener('click', restartGame);
document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  game.scene.stop('GameScene');
});
document.getElementById('restart-btn').removeEventListener('click', restartGame);
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  game.scene.stop('GameScene');
});

document.getElementById('btn-ranking').addEventListener('click', () => {
  const list = getRanking();
  const h3 = document.querySelector('#ranking-panel h3');
  if (h3) h3.textContent = '🏆 ' + (MODE_LABEL[gameMode] || '') + ' TOP10';
  const el = document.getElementById('ranking-list');
  if (list.length === 0) {
    el.innerHTML = '<div style="color:#888;text-align:center;padding:16px">まだ記録がありません</div>';
  } else {
    const medals = ['🥇','🥈','🥉'];
    el.innerHTML = list.map((r, i) =>
      `<div class="rank-row">
        <span class="rank-num">${medals[i] || (i+1)}</span>
        <span class="rank-score">${r.score.toLocaleString()}</span>
        <span class="rank-date">${r.date}</span>
      </div>`
    ).join('');
  }
  document.getElementById('ranking-overlay').style.display = 'flex';
});

document.getElementById('ranking-close').addEventListener('click', () => {
  document.getElementById('ranking-overlay').style.display = 'none';
});
document.getElementById('ranking-overlay').style.display = 'none';
</script>
